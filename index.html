<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파스타 레시피 앱 (프로토타입)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #FFF6EC;
    --surface: #FFFFFF;
    --tomato: #E85D2C;
    --tomato-dark: #C8481E;
    --gold: #F4A93C;
    --basil: #4F7942;
    --ink: #2B1B12;
    --ink-soft: #8A7A6D;
    --line: #F1E3D3;
    --shadow: 0 8px 20px rgba(200, 90, 40, 0.12);
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: #EFE3D2;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, .brand, .title, .section-title { font-family: 'Fraunces', serif; }

  header {
    padding: 18px 16px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }
  header .brand { font-size: 19px; font-weight: 700; color: var(--ink); }
  .view { display: none; padding: 16px; background: var(--cream); min-height: calc(100vh - 56px); }
  .view.active { display: block; }

  /* 탭 */
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab {
    flex: 1; text-align: center; padding: 10px; cursor: pointer;
    border-radius: 14px; font-weight: 600; font-size: 14px; color: var(--ink-soft);
    background: #fff;
  }
  .tab.active { background: var(--tomato); color: #fff; box-shadow: var(--shadow); }

  /* 보기 전환 버튼 */
  .view-toggle-btn {
    font-size: 12px; padding: 6px 12px; border: 1px solid var(--line);
    background: #fff; cursor: pointer; border-radius: 999px; color: var(--ink-soft); font-weight: 600;
  }
  .view-toggle-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* 갤러리(그리드) 보기 */
  #recipe-list.mode-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  #recipe-list.mode-gallery .recipe-card { flex-direction: column; padding: 0; overflow: hidden; }
  #recipe-list.mode-gallery .thumb { width: 100%; height: 130px; border-radius: 18px 18px 0 0; font-size: 40px; }
  #recipe-list.mode-gallery .card-info { padding: 10px 12px 0; }
  #recipe-list.mode-gallery .card-likes { padding: 0 12px 10px; }

  /* 카테고리 칩 */
  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 14px; }
  .chip {
    padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
    white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600;
    background: #fff; color: var(--ink-soft); flex-shrink: 0;
  }
  .chip.active { background: var(--gold); color: #5A3A0A; border-color: var(--gold); }

  /* 레시피 카드 */
  .recipe-card {
    display: flex; gap: 12px; background: var(--surface); border-radius: 18px;
    padding: 10px; margin-bottom: 12px; cursor: pointer; box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .thumb {
    width: 64px; height: 64px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg, #FFD9A8, #F4A93C);
    display: flex; align-items: center; justify-content: center; font-size: 26px; overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-info { flex: 1; min-width: 0; }
  .card-info .title { font-weight: 700; font-size: 15px; }
  .card-info .meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .card-likes { font-size: 12px; color: var(--tomato-dark); font-weight: 600; align-self: flex-end; }

  /* 등록 버튼 */
  .fab {
    position: sticky; bottom: 16px; float: right; width: 52px; height: 52px;
    border-radius: 50%; background: var(--tomato); color: #fff; border: none;
    font-size: 24px; cursor: pointer; box-shadow: 0 10px 22px rgba(200,72,30,0.4);
  }

  /* 상세 */
  .detail-photo {
    width: 100%; height: 200px; border-radius: 20px;
    background: linear-gradient(135deg, #FFD9A8, #F4A93C);
    display: flex; align-items: center; justify-content: center; color: #5A3A0A;
    margin-bottom: 12px; font-size: 60px; overflow: hidden;
  }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700; background: var(--tomato);
    color: #fff; padding: 3px 10px; border-radius: 999px; margin-left: 6px;
  }
  .source-link {
    display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--line);
    border-radius: 14px; padding: 10px 12px; margin: 10px 0; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .section-title { font-weight: 700; margin: 16px 0 6px; font-size: 16px; }
  .ingredient-row, .step-row {
    font-size: 13px; padding: 8px 10px; border-radius: 10px; background: #fff;
    border: 1px solid var(--line); margin-bottom: 6px;
  }
  .reactions {
    display: flex; gap: 18px; padding: 12px 14px; border-radius: 14px; background: #fff;
    border: 1px solid var(--line); margin: 12px 0; font-size: 13px; font-weight: 600;
  }
  .reactions button { background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--tomato-dark); }

  /* 리뷰 */
  .review-form { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
  .review-form textarea {
    width: 100%; height: 50px; margin: 8px 0; font-family: inherit;
    border: 1px solid var(--line); border-radius: 10px; padding: 8px; resize: none;
  }
  .star-input span { font-size: 20px; cursor: pointer; color: #E6D9C8; }
  .star-input span.selected { color: var(--gold); }
  .review-item { border-bottom: 1px solid var(--line); padding: 10px 0; font-size: 13px; }
  .review-item .stars { color: var(--gold); }
  .review-photo { width: 64px; height: 64px; object-fit: cover; margin-top: 6px; border-radius: 12px; }

  /* 댓글 */
  .comment-item {
    font-size: 13px; padding: 8px 10px; border-radius: 10px; background: #fff;
    border: 1px solid var(--line); margin-bottom: 6px;
  }
  .comment-input { display: flex; gap: 8px; margin-top: 10px; }
  .comment-input input { flex: 1; border-radius: 999px; }

  /* 등록 폼 */
  form .field { margin-bottom: 14px; }
  form label { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 5px; font-weight: 600; }
  form input[type=text], form input[type=url], form textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px;
    font-family: inherit; background: #fff;
  }
  form textarea { height: 70px; font-family: inherit; resize: none; }
  .ingredient-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .ingredient-input-row input { flex: 1; }
  .upload-box {
    border: 1.5px dashed var(--gold); border-radius: 16px; padding: 20px; text-align: center;
    color: var(--ink-soft); cursor: pointer; background: #FFF9F0; font-weight: 600; font-size: 13px;
  }
  .upload-box img { max-width: 100%; max-height: 110px; border-radius: 12px; }
  .ai-box {
    background: #FFF1DE; border: 1px solid var(--gold); color: #8A5A0A;
    padding: 10px 12px; font-size: 12px; margin: 10px 0; border-radius: 12px; font-weight: 600;
  }
  .btn {
    padding: 10px 18px; border: none; background: var(--tomato); color: #fff;
    cursor: pointer; border-radius: 999px; font-weight: 700; font-size: 13px;
  }
  .btn.secondary { background: #fff; color: var(--tomato); border: 1px solid var(--tomato); }
  .back-btn { cursor: pointer; font-weight: 600; }

  /* iOS 자동 확대 방지 — input은 16px 미만이면 Safari가 강제 줌인 */
  form input[type=text], form input[type=url], form textarea,
  .comment-input input, #review-text {
    font-size: 16px;
  }

  /* 모바일 터치 영역 최적화 */
  .tab { min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .fab { width: 56px; height: 56px; }
  .btn { min-height: 44px; }

  .bg-music-host {
    position: fixed;
    left: -9999px;
    top: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* 좁은 화면 (360px 이하) 대응 */
  @media (max-width: 360px) {
    header .brand { font-size: 16px; }
    .view-toggle-btn { font-size: 11px; padding: 5px 9px; }
    #recipe-list.mode-gallery { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    #recipe-list.mode-gallery .thumb { height: 100px; }
  }
</style>
</head>
<body>

<!-- ===== 1. 레시피 목록 화면 ===== -->
<div id="view-list" class="view active">
  <header>
    <span class="brand">🍝 파스타레시피</span>
    <div style="display:flex; gap:6px; align-items:center;">
      <button class="view-toggle-btn active" id="btn-view-list" onclick="switchViewMode('list')">목록</button>
      <button class="view-toggle-btn" id="btn-view-gallery" onclick="switchViewMode('gallery')">갤러리</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-author="master" onclick="switchTab(this)">Master</div>
    <div class="tab" data-author="user" onclick="switchTab(this)">User</div>
  </div>

  <div class="chips" id="chips"></div>

  <div id="recipe-list" class="mode-list"></div>

  <button class="fab" onclick="goTo('view-register')">+</button>
</div>

<!-- ===== 2. 레시피 상세 화면 ===== -->
<div id="view-detail" class="view">
  <header>
    <span class="back-btn" onclick="goTo('view-list')">← 뒤로</span>
    <span class="brand" style="font-size:16px;">레시피 상세</span>
  </header>

  <div class="detail-photo" id="detail-photo">사진 없음</div>

  <div>
    <span id="detail-title" style="font-weight:bold; font-size:16px;"></span>
    <span class="badge" id="detail-author-badge"></span>
  </div>
  <div style="font-size:12px; color:#777; margin:4px 0;" id="detail-meta"></div>

  <div class="source-link" id="detail-source" onclick="alert('원본 영상/게시물 링크로 이동 (목업)')">
    <span>▶ 원본 콘텐츠 보기</span>
  </div>

  <div class="section-title">재료</div>
  <div id="detail-ingredients"></div>

  <div class="section-title">조리순서</div>
  <div id="detail-steps"></div>

  <div class="reactions">
    <button onclick="toggleLike()"><span id="like-icon">♡</span> <span id="like-count">0</span></button>
    <span>💬 <span id="comment-count">0</span></span>
    <span>★ <span id="avg-rating">-</span></span>
  </div>

  <div class="section-title">리뷰 작성</div>
  <div class="review-form">
    <div class="star-input" id="review-star-input">
      <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
    </div>
    <textarea id="review-text" placeholder="만들어 본 후기를 남겨주세요"></textarea>
    <div class="upload-box" id="review-photo-box" onclick="document.getElementById('review-photo-input').click()">
      📷 사진 첨부 (선택)
    </div>
    <input type="file" id="review-photo-input" accept="image/*" style="display:none;" onchange="previewReviewPhoto(event)">
    <button class="btn" onclick="submitReview()">리뷰 등록</button>
  </div>

  <div class="section-title">리뷰 목록</div>
  <div id="review-list"></div>

  <div class="section-title">댓글</div>
  <div id="comment-list"></div>
  <div class="comment-input">
    <input type="text" id="comment-input" placeholder="댓글을 입력하세요">
    <button class="btn secondary" onclick="submitComment()">등록</button>
  </div>
</div>

<!-- ===== 3. 레시피 등록 화면 (링크 기반) ===== -->
<div id="view-register" class="view">
  <header>
    <span class="back-btn" onclick="goTo('view-list')">× 취소</span>
    <span class="brand" style="font-size:16px;">레시피 등록</span>
    <button class="btn" onclick="submitRecipe()">등록</button>
  </header>

  <form onsubmit="return false;">
    <div class="field">
      <label>유튜브 / 인스타 링크</label>
      <div style="display:flex; gap:6px;">
        <input type="url" id="reg-link" placeholder="https://...">
        <button type="button" class="btn secondary" onclick="fetchSummary()">불러오기</button>
      </div>
    </div>

    <div class="ai-box" id="ai-box" style="display:none;">
      AI가 링크 콘텐츠를 분석해 제목/재료/조리순서를 자동으로 채웠어요. 필요한 부분은 직접 수정하세요.
    </div>

    <div class="field">
      <label>제목</label>
      <input type="text" id="reg-title" placeholder="레시피 제목">
    </div>

    <div class="field">
      <label>종류</label>
      <div class="chips" id="reg-category-chips"></div>
    </div>

    <div class="field">
      <label>재료</label>
      <div id="reg-ingredients"></div>
      <button type="button" class="btn secondary" onclick="addIngredientField()">+ 재료 추가</button>
    </div>

    <div class="field">
      <label>조리순서</label>
      <textarea id="reg-steps" placeholder="1. 면을 삶는다&#10;2. 소스를 만든다"></textarea>
    </div>

    <div class="field">
      <label>내가 만든 파스타 사진 (썸네일로 사용)</label>
      <div class="upload-box" id="reg-photo-box" onclick="document.getElementById('reg-photo-input').click()">
        📷 사진 추가
      </div>
      <input type="file" id="reg-photo-input" accept="image/*" style="display:none;" onchange="previewRecipePhoto(event)">
    </div>
  </form>
</div>

    ingredients: ["링귀니 200g", "새우 6마리", "토마토소스 100ml", "생크림 100ml"],
    steps: ["새우를 손질한다", "소스를 만든다", "면과 함께 끓인다"],
    likes: 61, liked: false, comments: [], reviews: [] },
];
let nextId = 4;
let currentAuthorTab = "master";
let currentCategory = "전체";
let currentViewMode = "list"; // "list" | "gallery"
let currentRecipeId = null;
let regSelectedCategory = "크림";
let reviewSelectedStar = 0;
let regPhotoDataUrl = null;
let reviewPhotoDataUrl = null;

/* ===================== 화면 전환 ===================== */
function goTo(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  if (viewId === 'view-list') renderList();
}

/* ===================== 목록 화면 ===================== */
function renderChips() {
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  CATEGORIES.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip' + (c === currentCategory ? ' active' : '');
    el.textContent = c;
    el.onclick = () => { currentCategory = c; renderList(); };
    wrap.appendChild(el);
  });
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentAuthorTab = el.dataset.author;
  renderList();
}

function switchViewMode(mode) {
  currentViewMode = mode;
  document.getElementById('btn-view-list').classList.toggle('active', mode === 'list');
  document.getElementById('btn-view-gallery').classList.toggle('active', mode === 'gallery');
  renderList();
}

function renderList() {
  renderChips();
  const listEl = document.getElementById('recipe-list');
  listEl.className = currentViewMode === 'gallery' ? 'mode-gallery' : 'mode-list';
  listEl.innerHTML = '';
  const filtered = recipes.filter(r =>
    r.author === currentAuthorTab &&
    (currentCategory === "전체" || r.category === currentCategory)
  );
  if (filtered.length === 0) {
    listEl.innerHTML = '<p style="color:#999; font-size:13px;">레시피가 없습니다.</p>';
    return;
  }
  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.onclick = () => openDetail(r.id);
    card.innerHTML = `
      <div class="thumb">${`<img src="${r.photo || pastaImage(r.category)}" onerror="this.onerror=null;this.src='${pastaImage(r.category)}';">`}</div>
      <div class="card-info">
        <div class="title">${r.title}</div>
        <div class="meta">${r.author === 'master' ? 'Master' : 'User'} · ${r.category}</div>
      </div>
      <div class="card-likes">♥ ${r.likes}</div>
    `;
    listEl.appendChild(card);
  });
}

/* ===================== 상세 화면 ===================== */
function openDetail(id) {
  currentRecipeId = id;
  const r = recipes.find(x => x.id === id);

  document.getElementById('detail-photo').innerHTML = `<img src="${r.photo || pastaImage(r.category)}" onerror="this.onerror=null;this.src='${pastaImage(r.category)}';">`;
  document.getElementById('detail-title').textContent = r.title;
  document.getElementById('detail-author-badge').textContent = r.author === 'master' ? 'Master' : 'User';
  document.getElementById('detail-meta').textContent = `${r.category} · ${r.duration}`;

  document.getElementById('detail-ingredients').innerHTML =
    r.ingredients.map(i => `<div class="ingredient-row">${i}</div>`).join('');
  document.getElementById('detail-steps').innerHTML =
    r.steps.map((s, idx) => `<div class="step-row">${idx + 1}. ${s}</div>`).join('');

  updateReactionUI(r);
  renderReviews(r);
  renderComments(r);

  // 리뷰 입력 초기화
  reviewSelectedStar = 0;
  reviewPhotoDataUrl = null;
  document.getElementById('review-text').value = '';
  document.getElementById('review-photo-box').textContent = '📷 사진 첨부 (선택)';
  document.querySelectorAll('#review-star-input span').forEach(s => s.classList.remove('selected'));

  goTo('view-detail');
}

function updateReactionUI(r) {
  document.getElementById('like-icon').textContent = r.liked ? '♥' : '♡';
  document.getElementById('like-count').textContent = r.likes;
  document.getElementById('comment-count').textContent = r.comments.length;
  const avg = r.reviews.length
    ? (r.reviews.reduce((s, rv) => s + rv.rating, 0) / r.reviews.length).toFixed(1)
    : '-';
  document.getElementById('avg-rating').textContent = avg;
}

function toggleLike() {
  const r = recipes.find(x => x.id === currentRecipeId);
  r.liked = !r.liked;
  r.likes += r.liked ? 1 : -1;
  updateReactionUI(r);
}

/* ----- 리뷰 ----- */
document.getElementById('review-star-input').addEventListener('click', (e) => {
  if (e.target.tagName !== 'SPAN') return;
  reviewSelectedStar = parseInt(e.target.dataset.v);
  document.querySelectorAll('#review-star-input span').forEach(s => {
    s.classList.toggle('selected', parseInt(s.dataset.v) <= reviewSelectedStar);
  });
});

function previewReviewPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    reviewPhotoDataUrl = reader.result;
    document.getElementById('review-photo-box').innerHTML = `<img src="${reviewPhotoDataUrl}" style="max-height:80px;">`;
  };
  reader.readAsDataURL(file);
}

function submitReview() {
  if (reviewSelectedStar === 0) { alert('별점을 선택해주세요.'); return; }
  const r = recipes.find(x => x.id === currentRecipeId);
  r.reviews.push({ user: '나', rating: reviewSelectedStar, text: document.getElementById('review-text').value, photo: reviewPhotoDataUrl });
  openDetail(r.id);
}

function renderReviews(r) {
  const el = document.getElementById('review-list');
  el.innerHTML = r.reviews.length ? '' : '<p style="font-size:12px;color:#999;">아직 리뷰가 없습니다.</p>';
  r.reviews.forEach(rv => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <div><strong>${rv.user}</strong> <span class="stars">${'★'.repeat(rv.rating)}${'☆'.repeat(5 - rv.rating)}</span></div>
      <div>${rv.text || ''}</div>
      ${rv.photo ? `<img class="review-photo" src="${rv.photo}">` : ''}
    `;
    el.appendChild(div);
  });
}

/* ----- 댓글 ----- */
function submitComment() {
  const input = document.getElementById('comment-input');
  if (!input.value.trim()) return;
  const r = recipes.find(x => x.id === currentRecipeId);
  r.comments.push({ user: '나', text: input.value });
  input.value = '';
  renderComments(r);
  updateReactionUI(r);
}

function renderComments(r) {
  const el = document.getElementById('comment-list');
  el.innerHTML = r.comments.length ? '' : '<p style="font-size:12px;color:#999;">아직 댓글이 없습니다.</p>';
  r.comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment-item';
    div.innerHTML = `<strong>${c.user}</strong> ${c.text}`;
    el.appendChild(div);
  });
}

/* ===================== 등록 화면 ===================== */
function renderRegCategoryChips() {
  const wrap = document.getElementById('reg-category-chips');
  wrap.innerHTML = '';
  CATEGORIES.filter(c => c !== "전체").forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip' + (c === regSelectedCategory ? ' active' : '');
    el.textContent = c;
    el.onclick = () => { regSelectedCategory = c; renderRegCategoryChips(); };
    wrap.appendChild(el);
  });
}

function addIngredientField(value = '') {
  const wrap = document.getElementById('reg-ingredients');
  const row = document.createElement('div');
  row.className = 'ingredient-input-row';
  row.innerHTML = `<input type="text" value="${value}" placeholder="재료명, 분량">
                    <button type="button" class="btn secondary" onclick="this.parentElement.remove()">삭제</button>`;
  wrap.appendChild(row);
}

function previewRecipePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    regPhotoDataUrl = reader.result;
    document.getElementById('reg-photo-box').innerHTML = `<img src="${regPhotoDataUrl}">`;
  };
  reader.readAsDataURL(file);
}

/* ----- 링크 불러오기 (AI 자동 요약 목업) ----- */
function fetchSummary() {
  const link = document.getElementById('reg-link').value;
  if (!link) { alert('링크를 입력해주세요.'); return; }

  // 실제로는 서버에서 영상/게시물 콘텐츠를 분석해 요약 결과를 받아온다.
  // 여기서는 목업 데이터로 자동 채움을 시뮬레이션한다.
  document.getElementById('ai-box').style.display = 'block';
  document.getElementById('reg-title').value = '크림 파스타 (AI 자동 생성 제목)';
  regSelectedCategory = '크림';
  renderRegCategoryChips();

  document.getElementById('reg-ingredients').innerHTML = '';
  addIngredientField('페투치니 200g');
  addIngredientField('생크림 200ml');
  addIngredientField('파마산 치즈 30g');

  document.getElementById('reg-steps').value = '1. 면을 삶는다\n2. 생크림과 치즈로 소스를 만든다\n3. 면과 소스를 섞는다';
}

function submitRecipe() {
  const title = document.getElementById('reg-title').value;
  if (!title) { alert('제목을 입력해주세요 (링크 불러오기를 먼저 실행하거나 직접 입력하세요).'); return; }

  const ingredients = Array.from(document.querySelectorAll('#reg-ingredients input')).map(i => i.value).filter(Boolean);
  const steps = document.getElementById('reg-steps').value.split('\n').map(s => s.replace(/^\d+\.\s*/, '')).filter(Boolean);

  recipes.push({
    id: nextId++,
    title,
    author: 'user',
    category: regSelectedCategory,
    duration: '-',
    sourceUrl: document.getElementById('reg-link').value,
    photo: regPhotoDataUrl,
    ingredients,
    steps,
    likes: 0,
    liked: false,
    comments: [],
    reviews: [],
  });

  resetRegisterForm();
  goTo('view-list');
}

function resetRegisterForm() {
  document.getElementById('reg-link').value = '';
  document.getElementById('reg-title').value = '';
  document.getElementById('reg-steps').value = '';
  document.getElementById('reg-ingredients').innerHTML = '';
  document.getElementById('ai-box').style.display = 'none';
  document.getElementById('reg-photo-box').textContent = '📷 사진 추가';
  regPhotoDataUrl = null;
  regSelectedCategory = '크림';
  renderRegCategoryChips();
  addIngredientField();
}

/* ===================== 초기화 ===================== */
renderRegCategoryChips();
addIngredientField();
renderList();
</script>

<script>
let bgMusicPlayer = null;
let bgMusicStarted = false;

function createBackgroundMusicPlayer() {
  if (bgMusicPlayer || !window.YT || !document.getElementById('bg-music-host')) return;

  bgMusicPlayer = new YT.Player('bg-music-host', {
    videoId: 'XNzewEFc9w4',
    playerVars: {
      autoplay: 0,
      loop: 1,
      playlist: 'XNzewEFc9w4',
      controls: 0,
      modestbranding: 1,
      rel: 0,
      playsinline: 1,
      iv_load_policy: 3
    },
    events: {
      onReady: (event) => {
        event.target.setVolume(8);
        event.target.setLoop(true);
      },
      onStateChange: (event) => {
        if (event.data === YT.PlayerState.ENDED) {
          event.target.playVideo();
        }
      }
    }
  });
}

function initBackgroundMusic() {
  if (bgMusicStarted) return;
  bgMusicStarted = true;

  if (window.YT && window.YT.Player) {
    createBackgroundMusicPlayer();
    return;
  }

  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.body.appendChild(tag);
  window.onYouTubeIframeAPIReady = () => {
    createBackgroundMusicPlayer();
    if (bgMusicPlayer) {
      bgMusicPlayer.playVideo();
      bgMusicPlayer.setVolume(8);
    }
  };
}

function startBackgroundMusic() {
  if (!bgMusicPlayer) {
    initBackgroundMusic();
    return;
  }

  try {
    bgMusicPlayer.setVolume(8);
    bgMusicPlayer.playVideo();
  } catch (e) {
    console.warn('배경 음악 재생 실패:', e);
  }
}

document.addEventListener('click', startBackgroundMusic, { once: true });
document.addEventListener('touchstart', startBackgroundMusic, { once: true });
document.addEventListener('keydown', startBackgroundMusic, { once: true });
</script>
</body>
</html>
